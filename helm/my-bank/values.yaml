secrets:
  postgresUser: postgres
  postgresPassword: postgres
  keycloakAdmin: admin
  keycloakAdminPassword: admin
  accountsClientSecret: accounts-secret
  cashClientSecret: cash-secret
  transferClientSecret: transfer-secret
  frontUiClientSecret: front-ui-secret

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
  storage:
    size: 1Gi

kafka:
  image:
    repository: apache/kafka
    tag: "3.9.0"
  storage:
    size: 1Gi

zipkin:
  image:
    repository: openzipkin/zipkin
    tag: "3"
  service:
    type: NodePort
    port: 9411
    nodePort: 30411

prometheus:
  image:
    repository: prom/prometheus
    tag: "v3.0.1"
  service:
    type: NodePort
    port: 9090
    nodePort: 30909

grafana:
  image:
    repository: grafana/grafana
    tag: "11.4.0"
  service:
    type: NodePort
    port: 3000
    nodePort: 30300
  admin:
    user: admin
    password: admin

elasticsearch:
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "8.16.1"
  service:
    type: ClusterIP
    port: 9200
  javaOpts: "-Xms512m -Xmx512m"

logstash:
  image:
    repository: docker.elastic.co/logstash/logstash
    tag: "8.16.1"
  service:
    type: ClusterIP
    tcpPort: 5000
  javaOpts: "-Xms256m -Xmx256m"

kibana:
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: "8.16.1"
  service:
    type: NodePort
    port: 5601
    nodePort: 30561

keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0.0"
  service:
    type: NodePort
    port: 8080
    nodePort: 30180

accounts:
  image:
    repository: my-bank-accounts
    tag: latest

cash:
  image:
    repository: my-bank-cash
    tag: latest

transfer:
  image:
    repository: my-bank-transfer
    tag: latest

notifications:
  image:
    repository: my-bank-notifications
    tag: latest

gateway:
  image:
    repository: my-bank-gateway
    tag: latest

front-ui:
  image:
    repository: my-bank-front-ui
    tag: latest
  service:
    type: NodePort
    nodePort: 30081