apiVersion: v1
kind: Service
metadata:
  name: front-ui
  labels:
    {{- include "front-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
  selector:
    {{- include "front-ui.selectorLabels" . | nindent 4 }}