apiVersion: v1
kind: ConfigMap
metadata:
  name: accounts-config
  labels:
    {{- include "accounts.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/my_bank"
  KEYCLOAK_JWK_SET_URI: "http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs"
  KEYCLOAK_TOKEN_URI: "http://keycloak:8080/realms/my-bank/protocol/openid-connect/token"
  APP_NOTIFICATIONS_URL: "http://notifications:8085"