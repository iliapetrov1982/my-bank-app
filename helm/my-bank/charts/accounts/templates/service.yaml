apiVersion: v1
kind: Service
metadata:
  name: accounts
  labels:
    {{- include "accounts.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
  selector:
    {{- include "accounts.selectorLabels" . | nindent 4 }}