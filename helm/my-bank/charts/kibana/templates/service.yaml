apiVersion: v1
kind: Service
metadata:
  name: kibana
  labels:
    {{- include "kibana.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
  selector:
    {{- include "kibana.selectorLabels" . | nindent 4 }}
