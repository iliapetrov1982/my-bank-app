apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  postgres-user: {{ .Values.secrets.postgresUser | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  keycloak-admin: {{ .Values.secrets.keycloakAdmin | quote }}
  keycloak-admin-password: {{ .Values.secrets.keycloakAdminPassword | quote }}
  accounts-client-secret: {{ .Values.secrets.accountsClientSecret | quote }}
  cash-client-secret: {{ .Values.secrets.cashClientSecret | quote }}
  transfer-client-secret: {{ .Values.secrets.transferClientSecret | quote }}
  front-ui-client-secret: {{ .Values.secrets.frontUiClientSecret | quote }}