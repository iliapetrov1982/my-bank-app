apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-logstash"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: busybox
      command: ['sh', '-c', 'for i in $(seq 1 60); do nc -z logstash 5000 && exit 0; sleep 2; done; exit 1']
  restartPolicy: Never
