apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-postgres"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: busybox
      command: ['sh', '-c', 'for i in $(seq 1 30); do nc -z postgres 5432 && exit 0; sleep 2; done; exit 1']
  restartPolicy: Never