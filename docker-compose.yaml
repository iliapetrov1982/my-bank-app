services:

  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: my-bank-postgres
    environment:
      POSTGRES_DB: my_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: my-bank-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery:
    build:
      context: ./discovery
    container_name: my-bank-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  config:
    build:
      context: ./config
    container_name: my-bank-config
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
    depends_on:
      discovery:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Business services
  # ============================================================

  notifications:
    build:
      context: ./notifications
    container_name: my-bank-notifications
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs
    depends_on:
      keycloak:
        condition: service_healthy
      config:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  accounts:
    build:
      context: ./accounts
    container_name: my-bank-accounts
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/my_bank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: accounts-secret
      APP_NOTIFICATIONS_URL: http://notifications:8085
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config:
        condition: service_healthy
      notifications:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  cash:
    build:
      context: ./cash
    container_name: my-bank-cash
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: cash-secret
      APP_ACCOUNTS_URL: http://accounts:8082
      APP_NOTIFICATIONS_URL: http://notifications:8085
    depends_on:
      keycloak:
        condition: service_healthy
      config:
        condition: service_healthy
      accounts:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  transfer:
    build:
      context: ./transfer
    container_name: my-bank-transfer
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: transfer-secret
      APP_ACCOUNTS_URL: http://accounts:8082
      APP_NOTIFICATIONS_URL: http://notifications:8085
    depends_on:
      keycloak:
        condition: service_healthy
      config:
        condition: service_healthy
      accounts:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway:
    build:
      context: ./gateway
    container_name: my-bank-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs
    depends_on:
      keycloak:
        condition: service_healthy
      config:
        condition: service_healthy
      accounts:
        condition: service_healthy
      cash:
        condition: service_healthy
      transfer:
        condition: service_healthy
      notifications:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  front-ui:
    build:
      context: ./front-ui
    container_name: my-bank-front-ui
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: front-ui-secret
      # authorization-uri остаётся на localhost — для браузера
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_AUTHORIZATION_URI: http://localhost:8180/realms/my-bank/protocol/openid-connect/auth
      # остальные URI — внутренние, для сервис-to-сервис
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_USER_INFO_URI: http://keycloak:8080/realms/my-bank/protocol/openid-connect/userinfo
      APP_GATEWAY_URL: http://gateway:8080
    depends_on:
      keycloak:
        condition: service_healthy
      gateway:
        condition: service_healthy

volumes:
  postgres-data:
