server:
  port: 8081

spring:
  application:
    name: front-ui
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: front-ui
            client-secret: ${KEYCLOAK_CLIENT_SECRET:front-ui-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email, accounts.read, accounts.write, cash.write, transfer.write
        provider:
          keycloak:
            authorization-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/auth
            token-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/token
            jwk-set-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/certs
            user-info-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

app:
  gateway-url: http://localhost:8080
